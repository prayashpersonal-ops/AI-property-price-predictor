<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Price Predictor</title>


<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #1d2671, #c33764);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        width: 350px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 10px;
        outline: none;
        font-size: 14px;
    }

    input::placeholder {
        color: #555;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: #ff7eb3;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4e91;
    }

    .result {
        text-align: center;
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
    }

    .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 12px;
        opacity: 0.7;
    }
</style>


</head>
<body>

<div class="container">
    <h2>AI Property Price Predictor</h2>


<form action="/predict" method="POST">
    <input type="number" name="area" placeholder="Area (sq ft)" required>
    <input type="number" name="bedrooms" placeholder="Bedrooms" required>
    <input type="number" name="bathrooms" placeholder="Bathrooms" required>
    <input type="number" name="age" placeholder="Property Age (years)" required>

    <button type="submit">Predict Price</button>
</form>


<div class="result">
    {{ prediction_text }}
</div>

<div class="footer">
    Built by Prayash🤍
    
</div>


</div>

</body>
</html>
